syntax = "proto3";

package kv;

option go_package = "/proto;proto";


service KV {
  rpc Put (PutRequest) returns (PutResponse);
  rpc Get (GetRequest) returns (GetResponse);
  rpc Delete (DeleteRequest) returns (DeleteResponse);
  rpc Watch (WatchRequest) returns (stream WatchResponse);
}

message PutRequest {
  string key = 1;
  string value = 2;
}

message PutResponse {
  bool success = 1;
}

message GetRequest {
  string key = 1;
}

message GetResponse {
  string key = 1;
  string value = 2;
  int64 version = 3;
  bool found = 4;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  bool success = 1;
}

message WatchRequest {
  string key = 1;
}

message WatchResponse {
  string key = 1;
  string value = 2;
  int64 version = 3;
}
