version: "3.8"

services:
  node1:
    build: ..
    container_name: meridian-node1
    environment:
      - NODE_ID=node-1
      - PORT=8080
    ports:
      - "8081:8080"

  node2:
    build: ..
    container_name: meridian-node2
    environment:
      - NODE_ID=node-2
      - PORT=8080
    ports:
      - "8082:8080"

  node3:
    build: ..
    container_name: meridian-node3
    environment:
      - NODE_ID=node-3
      - PORT=8080
    ports:
      - "8083:8080"
